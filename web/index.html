<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Release Harbor 发布港</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --panel: #fff;
      --line: #d7e0ec;
      --line-strong: #b8c5d8;
      --text: #1f2937;
      --muted: #64748b;
      --primary: #1769d8;
      --primary-dark: #1152aa;
      --ok: #157347;
      --warn: #a15c00;
      --danger: #b42318;
      --dark: #111827;
      --shadow: 0 10px 26px rgba(31, 41, 55, .08);
      font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); letter-spacing: 0; }
    button, input, textarea { font: inherit; }
    button { cursor: pointer; }

    .app { min-height: 100vh; display: grid; grid-template-columns: 280px minmax(0, 1fr); }
    .sidebar { background: #172033; color: #eef4ff; display: flex; flex-direction: column; min-width: 0; }
    .brand { height: 64px; display: flex; align-items: center; justify-content: space-between; padding: 0 18px; border-bottom: 1px solid rgba(255,255,255,.12); }
    .brand-title { font-size: 18px; font-weight: 700; white-space: nowrap; }
    .icon-button { width: 34px; height: 34px; border: 1px solid rgba(255,255,255,.18); background: rgba(255,255,255,.08); color: #fff; border-radius: 6px; display: inline-grid; place-items: center; line-height: 1; }
    .icon-button:hover { background: rgba(255,255,255,.16); }
    .project-list { padding: 12px; overflow: auto; display: grid; gap: 8px; }
    .project-item { width: 100%; text-align: left; border: 1px solid transparent; background: transparent; color: #d9e7ff; border-radius: 6px; padding: 10px 12px; display: grid; gap: 4px; }
    .project-item:hover { background: rgba(255,255,255,.08); }
    .project-item.active { background: #233454; border-color: rgba(255,255,255,.22); }
    .project-name { font-weight: 700; }
    .project-desc { color: #c7d7ee; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .project-path { color: #a9b8d0; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .main { display: grid; grid-template-rows: auto minmax(0, 1fr) 246px; min-width: 0; min-height: 100vh; }
    .toolbar { min-height: 58px; background: var(--panel); border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; padding: 8px 14px; gap: 12px; }
    .toolbar h1 { margin: 0; font-size: 19px; line-height: 1.2; }
    .toolbar > div:first-child { flex: 1 1 260px; min-width: 220px; }
    .toolbar-meta { color: var(--muted); font-size: 12px; margin-top: 3px; line-height: 1.35; }
    .toolbar-note { color: #7b8aa1; font-size: 11px; margin-top: 2px; line-height: 1.35; }
    .actions { flex: 0 1 auto; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
    .btn { min-height: 32px; border: 1px solid var(--line); background: #fff; color: var(--text); border-radius: 6px; padding: 6px 10px; display: inline-flex; gap: 5px; align-items: center; white-space: nowrap; font-size: 14px; line-height: 1.2; }
    .btn span:first-child { width: 14px; text-align: center; flex: 0 0 14px; }
    .btn:hover { border-color: var(--line-strong); }
    .btn.primary { background: var(--primary); border-color: var(--primary); color: #fff; }
    .btn.primary:hover { background: var(--primary-dark); }
    .btn.danger { color: var(--danger); }

    .content { padding: 16px 18px; overflow: auto; min-width: 0; }
    .progress-wrap { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; box-shadow: var(--shadow); padding: 12px 14px; margin-bottom: 14px; display: grid; gap: 10px; }
    .progress-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .progress-title { font-weight: 700; font-size: 14px; }
    .progress-text { color: var(--muted); font-size: 13px; }
    .progress-track { height: 10px; border-radius: 999px; background: #e6edf6; overflow: hidden; }
    .progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #1769d8, #34a853); transition: width .24s ease; }
    .step-list { display: flex; gap: 8px; flex-wrap: wrap; }
    .step { border: 1px solid #d6dfeb; color: var(--muted); background: #f8fafc; border-radius: 999px; padding: 3px 8px; font-size: 12px; }
    .step.active { border-color: #94b8ef; color: var(--primary-dark); background: #eef5ff; }
    .step.done { border-color: #a7d7be; color: var(--ok); background: #eefaf3; }

    .grid { display: grid; grid-template-columns: repeat(12, minmax(0, 1fr)); gap: 14px; align-items: start; }
    .section { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; box-shadow: var(--shadow); min-width: 0; }
    .span-6 { grid-column: span 6; }
    .span-7 { grid-column: span 7; }
    .span-5 { grid-column: span 5; }
    .span-12 { grid-column: span 12; }
    .section-header { min-height: 46px; padding: 12px 14px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .section-title { font-size: 15px; font-weight: 700; }
    .section-body { padding: 14px; display: grid; gap: 12px; }
    .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .field { display: grid; gap: 6px; min-width: 0; }
    .field.full { grid-column: 1 / -1; }
    label { color: #334155; font-size: 13px; font-weight: 600; }
    input, textarea { width: 100%; border: 1px solid #cfd8e6; border-radius: 6px; background: #fff; color: var(--text); min-height: 36px; padding: 8px 10px; outline: none; }
    input:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(20, 99, 217, .12); }
    textarea { min-height: 86px; resize: vertical; font-family: Consolas, "Microsoft YaHei", monospace; }
    .input-action { display: flex; gap: 8px; align-items: stretch; min-width: 0; }
    .input-action input { flex: 1 1 auto; min-width: 0; }
    .browse-btn { flex: 0 0 auto; min-height: 36px; border: 1px solid var(--line); background: #f8fafc; color: var(--text); border-radius: 6px; padding: 0 12px; white-space: nowrap; }
    .browse-btn:hover { border-color: var(--line-strong); background: #eef4fb; }
    .hint { color: var(--muted); font-size: 12px; }
    .badge { display: inline-flex; align-items: center; min-height: 24px; padding: 3px 8px; border-radius: 999px; font-size: 12px; border: 1px solid #cfd8e6; background: #f8fafc; color: var(--muted); }
    .badge.ok { color: var(--ok); border-color: #a7d7be; background: #eefaf3; }
    .badge.warn { color: var(--warn); border-color: #f1cf9a; background: #fff8ec; }

    .log-panel { background: #0f172a; color: #dbeafe; border-top: 1px solid #25324a; display: grid; grid-template-rows: 42px minmax(0, 1fr); min-width: 0; }
    .log-header { display: flex; align-items: center; justify-content: space-between; padding: 0 14px; border-bottom: 1px solid #25324a; }
    .log-title { font-weight: 700; font-size: 14px; }
    .log-actions { display: flex; gap: 8px; }
    .log-output { margin: 0; padding: 12px 14px; overflow: auto; font-family: Consolas, "Microsoft YaHei", monospace; font-size: 13px; line-height: 1.55; white-space: pre-wrap; }
    .mini-btn { border: 1px solid #3b4a67; background: #172033; color: #dbeafe; border-radius: 6px; min-height: 28px; padding: 4px 9px; }
    .empty { padding: 18px; color: #a9b8d0; font-size: 13px; }

    @media (max-width: 1320px) { .toolbar { padding: 8px 12px; gap: 10px; } .actions { gap: 5px; } .btn { min-height: 30px; padding: 5px 8px; font-size: 13px; } }
    @media (max-width: 1060px) { .app { grid-template-columns: 1fr; } .project-list { grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); } .main { min-height: calc(100vh - 140px); } .span-7, .span-5, .span-6 { grid-column: span 12; } }
    @media (max-width: 700px) { .toolbar { align-items: stretch; flex-direction: column; } .actions { justify-content: flex-start; } .form-grid { grid-template-columns: 1fr; } .main { grid-template-rows: auto minmax(0, 1fr) 280px; } }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-title">Release Harbor</div>
        <button class="icon-button" id="addProjectBtn" title="新增项目">＋</button>
      </div>
      <div class="project-list" id="projectList"></div>
    </aside>

    <main class="main">
      <header class="toolbar">
        <div>
          <h1 id="pageTitle">项目配置</h1>
          <div class="toolbar-meta" id="projectSubtitle">本地 H5 发布工作台</div>
          <div class="toolbar-note">配置保存到 config.local.json，执行日志来自 Python 后端。</div>
        </div>
        <div class="actions">
          <button class="btn" id="validateBtn"><span>✓</span><span>校验配置</span></button>
          <button class="btn" id="saveBtn"><span>□</span><span>保存配置</span></button>
          <button class="btn danger" id="deleteBtn"><span>×</span><span>删除项目</span></button>
          <button class="btn primary" id="uploadBtn" title="开始打包并上传"><span>▶</span><span>打包上传</span></button>
          <button class="btn" id="startBtn" title="启动当前包"><span>↻</span><span>启动</span></button>
          <button class="btn primary" id="fullBtn" title="打包上传并启动"><span>▶</span><span>上传并启动</span></button>
        </div>
      </header>

      <section class="content">
        <div class="progress-wrap">
          <div class="progress-row">
            <div class="progress-title" id="progressTitle">等待操作</div>
            <div class="progress-text" id="progressText">0%</div>
          </div>
          <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
          <div class="step-list" id="stepList"></div>
        </div>

        <div class="grid">
          <section class="section span-7">
            <div class="section-header">
              <div class="section-title">项目与构建</div>
              <span class="badge" id="projectBadge">未校验</span>
            </div>
            <div class="section-body">
              <div class="form-grid">
                <div class="field"><label for="name">项目名</label><input id="name" data-path="name" placeholder="visa"></div>
                <div class="field"><label for="defaultEnvironment">默认环境</label><input id="defaultEnvironment" data-path="default_environment" placeholder="pro"></div>
                <div class="field full"><label for="description">项目说明</label><input id="description" data-path="description" placeholder="签证业务后台 API 服务"></div>
                <div class="field full"><label for="path">本地项目路径</label><div class="input-action"><input id="path" data-path="path" placeholder="E:\work\workSpace\visa"><button class="browse-btn" type="button" id="browseProjectPath">选择</button></div></div>
                <div class="field full"><label for="buildCommand">打包命令</label><textarea id="buildCommand" data-json="build_command" placeholder='["mvn", "clean", "package", "-DskipTests"]'></textarea><div class="hint">以 JSON 数组保存，避免命令行空格转义问题。</div></div>
                <div class="field"><label for="artifact">构建产物</label><input id="artifact" data-path="artifact" placeholder="target/visaV3.jar"></div>
                <div class="field"><label for="packageType">包类型</label><select id="packageType" data-path="package_type"><option value="jar">jar</option><option value="war">war</option></select></div>
                <div class="field"><label for="environments">环境列表</label><input id="environments" data-list="environments" placeholder="dev,test,pro"></div>
              </div>
            </div>
          </section>

          <section class="section span-5">
            <div class="section-header"><div class="section-title">服务器上传</div><span class="badge warn" id="deployMode">SSH Key</span></div>
            <div class="section-body">
              <div class="form-grid">
                <div class="field"><label for="host">服务器地址</label><input id="host" data-deploy="host" placeholder="192.168.88.50"></div>
                <div class="field"><label for="port">端口</label><input id="port" data-deploy="port" placeholder="22"></div>
                <div class="field"><label for="user">用户</label><input id="user" data-deploy="user" placeholder="root"></div>
                <div class="field"><label for="remoteFilename">远程文件名</label><input id="remoteFilename" data-deploy="remote_filename" placeholder="visaV3.jar"></div>
                <div class="field full"><label for="privateKey">私钥路径</label><div class="input-action"><input id="privateKey" data-deploy="private_key" placeholder="C:\Users\Admin\.ssh\id_ed25519"><button class="browse-btn" type="button" id="browsePrivateKey">选择</button></div></div>
                <div class="field full"><label for="remoteDir">服务器目录</label><input id="remoteDir" data-deploy="remote_dir" placeholder="/www/nvisa"></div>
              </div>
            </div>
          </section>

          <section class="section span-12">
            <div class="section-header"><div class="section-title">服务控制</div><span class="badge" id="serviceTemplateBadge">启动按钮使用这些命令</span></div>
            <div class="section-body">
              <div class="hint" id="serviceTemplateHint">当前项目将使用手工填写的服务命令。</div>
              <div style="margin: 10px 0 14px;"><button class="btn" type="button" id="applyTemplateBtn">应用推荐命令</button></div>
              <div class="form-grid">
                <div class="field full"><label for="stopCommand">优雅停机命令</label><textarea id="stopCommand" data-service="stop_command" placeholder="pkill -f visaV3.jar"></textarea></div>
                <div class="field full"><label for="startCommand">启动命令</label><textarea id="startCommand" data-service="start_command" placeholder="nohup java -jar /www/nvisa/visaV3.jar --spring.profiles.active=pro > /www/nvisa/app.log 2>&1 &"></textarea></div>
                <div class="field"><label for="statusCommand">状态检查命令</label><input id="statusCommand" data-service="status_command" placeholder="ps -ef | grep visaV3.jar | grep -v grep"></div>
                <div class="field"><label for="startupWait">启动等待秒数</label><input id="startupWait" data-service="startup_wait_seconds" placeholder="3"></div>
              </div>
            </div>
          </section>

          <section class="section span-12">
            <div class="section-header"><div class="section-title">环境替换</div><span class="badge">打包前临时修改，结束后恢复</span></div>
            <div class="section-body">
              <div class="form-grid">
                <div class="field full"><label for="replacementFile">配置文件路径</label><input id="replacementFile" data-replacement="file" placeholder="src\main\resources\application.yml"></div>
                <div class="field"><label for="replacementRegex">匹配正则</label><input id="replacementRegex" data-replacement="regex" placeholder="(?m)^(\s*active:\s*).*$"></div>
                <div class="field"><label for="replacementValue">替换内容</label><input id="replacementValue" data-replacement="replacement" placeholder="\1{env}"></div>
              </div>
            </div>
          </section>
        </div>
      </section>

      <section class="log-panel">
        <div class="log-header">
          <div class="log-title">执行日志</div>
          <div class="log-actions"><button class="mini-btn" id="copyConfigBtn">复制配置 JSON</button><button class="mini-btn" id="clearLogBtn">清空日志</button></div>
        </div>
        <pre class="log-output" id="logOutput"></pre>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
